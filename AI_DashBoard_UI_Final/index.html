<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vyra Token Usage Dashboard</title>
    <!-- Typography uses the OS system font (SF Pro on Apple devices) — no
         webfont preconnects needed. -->
  </head>
  <body>
    <!--
      iOS 26 Liquid Glass refraction filter (Chromium only — backdrop-filter:
      url(#…) isn't supported in Safari/Firefox yet; those gracefully fall
      back to plain blur).

      How it works: feTurbulence generates a low-frequency fractal-noise
      field; feDisplacementMap uses that noise's R/G channels as 2-D
      displacement vectors, warping every pixel of the backdrop. Net result:
      the background appears to bend organically as it passes under the
      glass — the "liquid" in Liquid Glass.
    -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
      <filter id="liquid-glass" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="14" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="60" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
